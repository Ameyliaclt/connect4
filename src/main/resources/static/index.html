<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puissance 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Modal paramètres -->
  <div id="modal-overlay" onclick="fermerParametres()">
    <div id="modal-content" onclick="event.stopPropagation()">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--bleu);letter-spacing:0.06em;">Paramètres</div>
      <hr style="border:none;border-top:1px solid #e0e4f0;">
      <button onclick="api.rejouer();fermerParametres();" style="padding:10px 16px;background:var(--rouge);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.95rem;">🔄 Rejouer</button>
      <button onclick="fermerParametres()" style="padding:8px 16px;background:#f0f2f8;color:#333;border:1px solid #d0d4e8;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.9rem;">Fermer</button>
    </div>
  </div>

  <!-- Modal choix couleur -->
  <div id="modal-color" onclick="fermerChoixCouleur()">
    <div id="modal-color-content" onclick="event.stopPropagation()">
      <div class="modal-color-title">Choisir votre couleur</div>
      <p class="modal-color-subtitle">Joueur 1, quelle couleur souhaitez-vous ?</p>
      <div class="color-options">
        <button class="color-option color-rouge selected" data-color="1" onclick="
          document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          couleurJoueur1 = 1;
        ">
          <span class="color-preview rouge-preview"></span>
          <span class="color-label">Rouge</span>
        </button>
        <button class="color-option color-jaune" data-color="2" onclick="
          document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          couleurJoueur1 = 2;
        ">
          <span class="color-preview jaune-preview"></span>
          <span class="color-label">Jaune</span>
        </button>
      </div>
      <div class="modal-color-actions">
        <button class="btn-confirmer" onclick="confirmerCouleur()">Confirmer</button>
        <button class="btn-annuler" onclick="fermerChoixCouleur()">Annuler</button>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="sidebar">
      <div class="actions-row">
        <button class="btn-action" onclick="api.retourner()">←</button>
        <button class="btn-action" onclick="api.remettre()">→</button>
        <button class="btn-action" onclick="api.pause()">⏸</button>
        <button class="btn-action" onclick="api.play()">▷</button>
      </div>
      <input type="number" id="num-prof" placeholder="ex: 4" min="1" max="12">
      <button class="btn-mode" onclick="api.analyse()">Analyse</button>
      <button class="btn-mode" onclick="api.suggestion()">IA jouerait</button>
      <button class="btn-mode" id="btn-predire" onclick="api.predire()">Prédiction</button>

      <span class="sidebar-label">Mode de jeu</span>
      <button class="btn-mode" data-mode="1" onclick="api.setModeJ(1)">JvsJ</button>
      <button class="btn-mode" data-mode="2" onclick="api.setModeJ(2)">JvsO</button>
      <button class="btn-mode" data-mode="3" onclick="api.setModeJ(3)">JvsO_IA</button>
      <button class="btn-mode" data-mode="4" onclick="api.setModeJ(4)">OvsO</button>
      <button class="btn-mode" data-mode="5" onclick="api.setModeJ(5)">IAvsIA</button>

      <span class="sidebar-label">Mode peinture</span>
      <div id="paint-toolbar">
        <button id="brush-rouge" class="btn-brush active" onclick="setPinceau(1)" title="Pion Rouge">
          <span class="color-preview rouge-preview"></span>
        </button>
        <button id="brush-jaune" class="btn-brush" onclick="setPinceau(2)" title="Pion Jaune">
          <span class="color-preview jaune-preview"></span>
        </button>
        <button id="brush-gomme" class="btn-brush" onclick="setPinceau(0)" title="Gomme">↩️</button>
      </div>
      <button id="btn-paint-mode" class="btn-mode" onclick="togglePeinture()">🎨 Peindre</button>
      <button id="btn-ia-peint" class="btn-mode" onclick="api.suggestionPeinture()" style="display:none;">Analyse prochain coup IA</button>
      <div style="flex:1;"></div>
      <span class="sidebar-label">Rejouer</span>
      <button onclick="ouvrirParametres()" style="font-size:0.9rem;width:fit-content;padding:3px 8px;border-radius:4px;align-self:flex-end;line-height:1;border:1px solid #ccc;background:#f0f2f8;cursor:pointer;">⚙️</button>
    </div>

    <div id="annonce">Sélectionner un mode de jeu</div>

    <div id="board-wrap">
      <div id="board-overlay">Choisir un mode de jeu</div>
      <div id="col-numbers"></div>
      <div id="grille"></div>
      <!-- Barre de progression IA -->
      <div id="ia-progress-container">
        <span id="ia-progress-label">IA réfléchit…</span>
        <div id="ia-progress-track">
          <div id="ia-progress-bar"></div>
        </div>
        <span id="ia-progress-text">0%</span>
      </div>
      <!-- Résultat prédiction -->
      <div id="prediction-result"></div>
    </div>

    <div style="text-align:center;padding:8px;font-family:'DM Mono',monospace;font-size:0.8rem;color:#888;letter-spacing:0.05em;background:transparent;grid-column:2;align-self:end;">
      Réalisé par <span style="color:var(--bleu);font-weight:500;">Ameylia Clement</span>
    </div>
    <div id="scores"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
